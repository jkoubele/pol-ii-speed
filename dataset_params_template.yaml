outdir: "./results" # Output folder for pipeline results.
workDir: "./work" # Path to Nextflow work directory (will be used for caching).

samplesheet: "./samplesheet.csv"  # Path to the CSV file with sample annotation.
fastq_dir: "/path/to/your/FASTQ" # Path to the folder containing FASTQ data.

gtf_file: "/path/to/the/gtf/genome/annotation/file"
genome_fasta: "/path/to/genome/fasta"
transcriptome_fasta: "/path/to/transcriptome/fasta"
gtf_source: "ensembl" # Either 'ensembl' or 'gencode'.

star_index: null # Optional path to existing STAR index.
salmon_index: null # Optional path to existing Salmon index.
salmon_index_with_decoy: false  # If true, use decoy-aware Salmon indexing.
# See Salmon documentation for details: https://salmon.readthedocs.io/en/latest/salmon.html#preparing-transcriptome-indices-mapping-based-mode
# Can require lots of memory for larger genomes, we didn't manage to execute it for human genome even with 200GB RAM.

ignore_tx_version: true # Passed to tximport (argument ignoreTxVersion). If true, ignores transcript version suffixes (e.g. ".1") when matching transcript IDs.
# Should be true when transcript IDs in the transcriptome FASTA contain version suffixes that are not present in the corresponding GTF.
# This is typically required for Ensembl human and mouse references.
# Should be false when transcript IDs match exactly between FASTA and GTF.
# For example, in the C. Elegans annotation from Ensembl, transcript suffixes are part of the true transcript IDs in both FASTA and GTF,
# and setting this argument to true would lead to incorrect transcript-to-gene mapping.

custom_gene_list: null # Optional path to a CSV file with genes to fit the model on. If left null, all protein coding genes will be used.

design_formula: "~your+design+formula" # Design formula, specified as formulas in R.

fit_pol_2_model: true
fit_global_splicing_model: true

lrt_contrasts: # List of contrasts for likelihood ratio tests.
  - variable: "your_categorical_variable_to_test" # For categorical variables, please specify groups (levels) that you want to compare
    group_1: "your_intervention_group"
    group_2: "your_control_group"

  - variable: "your_continuous_variable_to_test"

stage: 'all' # One of ['preprocess', 'model', 'all'].


